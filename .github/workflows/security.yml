name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install package dependencies
        run: pip install -e .

      - name: Audit Python dependencies for known CVEs
        # --skip-editable excludes the local package (pageant-assistant) which isn't on PyPI
        run: pip-audit --strict --desc --skip-editable

  trivy-image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t pageant-assistant:scan .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pageant-assistant:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
