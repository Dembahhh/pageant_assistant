name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit and pip-tools
        run: pip install pip-audit pip-tools

      - name: Audit Python dependencies for known CVEs
        # Compile deps from pyproject.toml (excludes our local package, which isn't on PyPI)
        # then audit only those third-party packages
        run: |
          pip-compile pyproject.toml --no-header --quiet -o /tmp/audit-reqs.txt
          pip-audit --strict --desc -r /tmp/audit-reqs.txt

  trivy-image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t pageant-assistant:scan .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pageant-assistant:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
